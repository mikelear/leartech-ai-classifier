{{- if .Values.training.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: classifier-train
  labels:
    app.kubernetes.io/name: {{ include "leartech-ai-classifier.name" . }}
    app.kubernetes.io/component: training
spec:
  schedule: {{ .Values.training.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "leartech-ai-classifier.name" . }}
            app.kubernetes.io/component: training
        spec:
          restartPolicy: Never
          containers:
          - name: train
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            command: ["/app/.venv/bin/python", "app/cron_train.py"]
            args:
            - --endpoint
            - "http://leartech-ai-classifier:8080"
            - --output-dir
            - "/tmp/model-output"
            - --accuracy-floor
            - {{ .Values.training.accuracyFloor | quote }}
            - --cluster-id
            - "gcp"
            env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.training.github.secretName }}
                  key: password
                  optional: true
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 2Gi
{{- end }}
