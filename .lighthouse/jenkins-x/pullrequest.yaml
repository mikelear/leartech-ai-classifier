apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: pullrequest
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          image: uses:mikelear/jx3-pipeline-catalog/tasks/python/pullrequest.yaml@master
          env:
          - name: HOME
            value: /tekton/home
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: ai-review-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - name: jx-variables
          resources: {}
        - image: python:3.13-slim
          name: build-python-test
          resources: {}
          script: |
            #!/bin/sh
            pip install uv --quiet
            uv sync --dev --frozen --no-cache 2>/dev/null || uv sync --dev --no-cache
            echo "=== Running tests ==="
            uv run coverage run -m pytest -v
            uv run coverage report
        - name: build-container-build
          resources: {}
        - name: promote-jx-preview
          resources: {}
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 12h0m0s
status: {}
