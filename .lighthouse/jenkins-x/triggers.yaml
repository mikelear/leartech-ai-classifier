apiVersion: config.lighthouse.jenkins-x.io/v1alpha1
kind: TriggerConfig
spec:
  presubmits:
  - name: pr
    context: "pr"
    always_run: true
    optional: false
    source: "pullrequest.yaml"
  - name: lint
    context: "lint"
    always_run: true
    optional: false
    source: "lint.yaml"
  - name: ai-code-review
    context: "ai-review"
    always_run: true
    optional: true
    source: "ai-review/pullrequest.yaml"
  - name: ai-review-feedback
    context: "ai-feedback"
    always_run: false
    optional: true
    trigger: "(?m)^/ai-feedback"
    rerun_command: "/ai-feedback"
    source: "ai-review/feedback.yaml"
  - name: security-scan
    context: "security-scan"
    always_run: true
    optional: true
    source: "security-scan/pullrequest.yaml"
  - name: image-scan
    context: "image-scan"
    always_run: true
    optional: true
    source: "security-scan/image-scan.yaml"
  - name: dynamic-security-scan
    context: "dynamic-scan"
    always_run: true
    optional: true
    source: "security-scan/dynamic/pullrequest.yaml"
  postsubmits:
  - name: release
    context: "release"
    source: "release.yaml"
    branches:
    - ^main$
